    <text x="722" y="130" fill="#111722" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="800">kaynak</text>
    <text x="722" y="154" fill="#69788a" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13">source</text>
    <text x="722" y="184" fill="#4f5c6d" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14">link değil</text>
    <text x="722" y="205" fill="#4f5c6d" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14">bağlamla okunur</text>
