    <circle cx="700" cy="145" r="10" fill="#fff" stroke="#dc1f35" stroke-width="2.6"/>
    <circle cx="945" cy="174" r="10" fill="#fff" stroke="#dc1f35" stroke-width="2.6"/>
    <circle cx="788" cy="263" r="10" fill="#fff" stroke="#dc1f35" stroke-width="2.6"/>
    <circle cx="508" cy="178" r="3" fill="#111722"/>
    <circle cx="700" cy="145" r="3" fill="#111722"/>
    <circle cx="945" cy="174" r="3" fill="#111722"/>
    <circle cx="788" cy="263" r="3" fill="#111722"/>
