    <text x="754" y="324" fill="#047857" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13">verification</text>
    <path d="M754 342C793 334 834 341 875 336" stroke="#0f9f6e" stroke-width="2.5" stroke-linecap="round"/>
  </g>

