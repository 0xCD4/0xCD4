    <text x="969" y="159" fill="#9a3412" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="800">rapor</text>
    <text x="969" y="183" fill="#c2410c" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13">report</text>
    <text x="969" y="215" fill="#9a3412" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14">kanıt</text>
    <text x="1020" y="215" fill="#9a3412" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14">sınır</text>
    <path d="M968 235C1001 229 1040 235 1070 231" stroke="#f97316" stroke-width="2.3" stroke-linecap="round"/>
  </g>

  <path d="M427 227C468 177 485 182 508 178" stroke="#dc1f35" stroke-width="2.6" stroke-linecap="round" opacity="0.55"/>
  <path d="M658 171C681 149 683 147 700 145" stroke="#dc1f35" stroke-width="2.6" stroke-linecap="round" opacity="0.55"/>
  <path d="M870 166C915 165 921 166 945 174" stroke="#dc1f35" stroke-width="2.6" stroke-linecap="round" opacity="0.55"/>
  <path d="M870 221C836 247 809 254 788 263" stroke="#dc1f35" stroke-width="2.1" stroke-linecap="round" opacity="0.38"/>

