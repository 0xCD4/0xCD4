  <g opacity="0.52">
    <path d="M504 313C554 302 594 315 641 307C678 301 704 309 734 303" stroke="#0f172a" stroke-width="2" stroke-linecap="round"/>
    <path d="M506 333C548 326 586 335 631 330" stroke="#0f172a" stroke-width="1.5" stroke-linecap="round"/>
