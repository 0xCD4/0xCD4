<svg width="1200" height="420" viewBox="0 0 1200 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">0xCD4 OSINT profil banner</title>
  <desc id="desc">Açık kaynak araştırması, doğrulama, arşiv ve raporlama temalarını gösteren sade çizim banner.</desc>
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="1200" y2="420" gradientUnits="userSpaceOnUse">
      <stop stop-color="#fbfbf8"/>
      <stop offset="0.55" stop-color="#f4f6f8"/>
      <stop offset="1" stop-color="#eef2f6"/>
    </linearGradient>
