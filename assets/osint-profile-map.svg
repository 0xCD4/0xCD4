<svg width="1200" height="430" viewBox="0 0 1200 430" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">0xCD4 OSINT mindset banner</title>
  <desc id="desc">OSINT araştırma zihniyetini soru, kaynak, bağlam, doğrulama ve rapor adımlarıyla anlatan çizim banner.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="430" gradientUnits="userSpaceOnUse">
      <stop stop-color="#fbfbf8"/>
      <stop offset="0.55" stop-color="#f5f7fa"/>
      <stop offset="1" stop-color="#edf2f7"/>
    </linearGradient>
    <linearGradient id="accent" x1="50" y1="44" x2="1150" y2="44" gradientUnits="userSpaceOnUse">
      <stop stop-color="#dc1f35"/>
      <stop offset="0.48" stop-color="#f59e0b"/>
      <stop offset="1" stop-color="#0f9f6e"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
    <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M44 0H0V44" stroke="#d8dee5" stroke-width="1" opacity="0.28"/>
    </pattern>
  </defs>

  <rect width="1200" height="430" rx="30" fill="url(#bg)"/>
  <rect width="1200" height="430" rx="30" fill="url(#grid)"/>
  <path d="M32 8C224 12 418 7 606 9C781 12 982 7 1168 10" stroke="url(#accent)" stroke-width="4.2" stroke-linecap="round"/>

  <g filter="url(#shadow)">
    <path d="M62 56C212 47 354 58 506 52C684 45 854 54 1032 50C1086 49 1126 54 1153 63C1162 158 1157 286 1143 370C966 383 802 374 617 381C430 389 247 375 72 380C55 282 50 157 62 56Z" fill="white" fill-opacity="0.78" stroke="#c8d1dc" stroke-width="2.1"/>
  </g>

  <g>
    <text x="96" y="101" fill="#dc1f35" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="800" letter-spacing="5">0xCD4 / CSINT</text>
    <text x="96" y="153" fill="#111722" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="46" font-weight="850">OSINT mindset</text>
    <text x="98" y="186" fill="#4f5c6d" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20">önce soru, sonra kaynak</text>
    <text x="98" y="213" fill="#69788a" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="17">first the question, then the source</text>

    <path d="M96 239C148 231 203 243 260 235C314 228 364 236 415 231" stroke="#dc1f35" stroke-width="2.4" stroke-linecap="round" opacity="0.56"/>
    <path d="M99 253C157 247 217 255 276 250C333 245 374 251 421 247" stroke="#dc1f35" stroke-width="1.4" stroke-linecap="round" opacity="0.28"/>

    <text x="96" y="306" fill="#111722" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="19" font-weight="700">tek iz kanıt değildir</text>
    <text x="96" y="333" fill="#111722" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="19" font-weight="700">bağlam olmadan rapor yazılmaz</text>
    <text x="96" y="360" fill="#111722" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="19" font-weight="700">bulmak paylaşmak demek değildir</text>
  </g>

  <g>
    <path d="M508 122C559 115 608 123 659 119C664 157 664 205 657 240C606 246 556 239 504 244C496 204 499 158 508 122Z" fill="#f8fafc" stroke="#c8d1dc" stroke-width="2"/>
    <text x="530" y="157" fill="#111722" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="800">soru</text>
    <text x="530" y="181" fill="#69788a" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13">question</text>
    <path d="M530 204C562 198 601 202 633 198" stroke="#dc1f35" stroke-width="2.2" stroke-linecap="round"/>
  </g>

  <g>
